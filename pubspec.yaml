name: mahmoud_math_app
description: منصة Flutter وFirebase للأستاذ محمود الدياب لمتابعة الدروس والنتائج والحضور والتنبيهات.
publish_to: 'none'
version: 1.1.3+7

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  cloud_firestore: ^6.6.0
  google_fonts: ^8.1.0
  url_launcher: ^6.3.2
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/images/app_icon.png
    - assets/images/brand_mark.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/images/app_icon.png
  adaptive_icon_background: '#271745'
  adaptive_icon_foreground: assets/images/brand_mark.png
  min_sdk_android: 21
