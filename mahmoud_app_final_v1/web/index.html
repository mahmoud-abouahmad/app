<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="منصة الأستاذ محمود الدياب لمتابعة الدروس والنتائج والحضور والتنبيهات.">
  <meta name="theme-color" content="#3E276A">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="منصة محمود الدياب">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="manifest" href="manifest.json">
  <title>منصة الأستاذ محمود الدياب</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #f2ecf8, #fffbf1, #f7f5fa);
      font-family: Arial, sans-serif;
    }
    #app-loading {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      z-index: 9999;
    }
    .loading-card {
      width: min(86vw, 340px);
      padding: 28px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 18px 60px rgba(62, 39, 106, 0.16);
      text-align: center;
      color: #271745;
    }
    .loading-card img {
      width: 108px;
      height: 108px;
      border-radius: 24px;
      object-fit: cover;
    }
    .loading-card h1 {
      margin: 14px 0 4px;
      font-size: 20px;
    }
    .loading-card p {
      margin: 0 0 16px;
      color: #6f637a;
      font-size: 14px;
    }
    .loader {
      width: 42px;
      height: 42px;
      margin: 0 auto;
      border: 4px solid #e9e3ef;
      border-top-color: #3e276a;
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="app-loading">
    <div class="loading-card">
      <img src="icons/Icon-192.png" alt="شعار الأستاذ محمود الدياب">
      <h1>منصة الأستاذ محمود الدياب</h1>
      <p>نبدأ بالحلم ونصنع الإنجاز</p>
      <div class="loader"></div>
    </div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      const loader = document.getElementById('app-loading');
      if (loader) loader.remove();
    });
  </script>
</body>
</html>
