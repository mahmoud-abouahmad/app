name: Build Final Release APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter stable
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install packages
        run: flutter pub get

      - name: Generate application icon
        run: dart run flutter_launcher_icons

      - name: Format source
        run: dart format lib test

      - name: Analyze source
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      - name: Run tests
        run: flutter test

      - name: Build universal release APK
        run: |
          mkdir -p release-apks
          flutter build apk --release
          cp build/app/outputs/flutter-apk/app-release.apk release-apks/mahmoud-dyab-app-release.apk

      - name: Build smaller release APKs
        run: |
          flutter build apk --release --split-per-abi
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk release-apks/mahmoud-dyab-arm64-release.apk
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk release-apks/mahmoud-dyab-armeabi-v7a-release.apk
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk release-apks/mahmoud-dyab-x86_64-release.apk

      - name: Upload final APK files
        uses: actions/upload-artifact@v4
        with:
          name: mahmoud-dyab-final-v1-apks
          path: release-apks/*.apk
          if-no-files-found: error
          retention-days: 30
