name: Build Final Release APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - final-v1

permissions:
  contents: read

jobs:
  build:
    name: Build Android Release
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter stable
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Clean project
        run: flutter clean

      - name: Install dependencies
        run: flutter pub get

      - name: Regenerate Android launcher icon
        run: |
          rm -rf android/app/src/main/res/mipmap-*
          dart run flutter_launcher_icons

      - name: Analyze source
        continue-on-error: true
        run: flutter analyze

      - name: Run tests
        continue-on-error: true
        run: flutter test

      - name: Build universal release APK
        run: |
          mkdir -p release-apks
          flutter build apk --release
          cp build/app/outputs/flutter-apk/app-release.apk release-apks/mahmoud-dyab-app-release.apk

      - name: Build smaller release APKs
        run: |
          flutter build apk --release --split-per-abi
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk release-apks/mahmoud-dyab-arm64-release.apk
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk release-apks/mahmoud-dyab-arm32-release.apk
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk release-apks/mahmoud-dyab-x86_64-release.apk

      - name: Upload release APKs
        uses: actions/upload-artifact@v4
        with:
          name: mahmoud-dyab-v1-2-release-apks
          path: release-apks/*.apk
          if-no-files-found: error
          retention-days: 30
